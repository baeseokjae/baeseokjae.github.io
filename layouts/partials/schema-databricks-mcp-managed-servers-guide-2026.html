      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Managed MCP servers are zero-setup, hosted by Databricks, and automatically enforce Unity Catalog governance. Building your own MCP server (on Databricks Apps or elsewhere) gives you full control over tool definitions and business logic but requires deployment, maintenance, and explicit permission checks. Start with managed servers; build custom ones only when you have requirements managed servers can't meet."

      "@type": "Question",
      "name": "How does on-behalf-of-user authentication work in practice?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "When a user connects Claude Desktop to a Databricks managed MCP server, they authenticate via the Databricks OAuth flow in their browser. The resulting short-lived OAuth token is stored locally by the databricks-mcp CLI. Every subsequent tool call sends this token to the Databricks API, which validates it and executes the request as that specific user — not as a shared service account. Unity Catalog then evaluates that user's specific permissions for the requested resource."
      }
    },

      "name": "Can multiple AI clients connect to the same MCP server simultaneously?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. The databricks-mcp serve command starts a local proxy process that handles multiple simultaneous connections. The underlying Databricks managed server is serverless and scales horizontally — there's no single-server bottleneck. Each client connection maintains its own authenticated session with its own OAuth token, so concurrent users see their own permission-filtered results."
      }
