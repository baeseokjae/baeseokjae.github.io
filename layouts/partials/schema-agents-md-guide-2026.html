      "name": "What is AGENTS.md and why do I need it?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AGENTS.md is a markdown file at your repository root that gives AI coding agents project-specific instructions: build commands, code style rules, testing requirements, and operational boundaries. You need it because AI agents without project context guess — and wrong guesses waste tokens, break tests, or create work you have to revert. A well-written AGENTS.md reduces AI agent runtime by up to 28.6% (Princeton research) and improves task success rates by approximately 4% (ETH Zurich)."
