      "name": "Is A2A the same as MCP (Model Context Protocol)?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. MCP (developed by Anthropic) standardizes how agents access tools and resources. A2A standardizes how agents communicate with other agents. They are complementary: an agent might use MCP to access a database tool and A2A to delegate a subtask to another agent. Many frameworks, including CrewAI, support both."
      }

        "@type": "Answer",
        "text": "A2A defines a task lifecycle (submitted → working → completed) with optional server-sent events for streaming intermediate updates. For tasks that take more than a few seconds, configure your A2AClientConfig with a streaming=True flag and handle the event stream in your crew's task callback. This prevents HTTP timeouts and gives users incremental progress feedback."
