      "acceptedAnswer": {

        "text": "Yes. The @openai/agents package reached 1.5 million downloads in a 30-day window as of March 2026, and the SDK is actively maintained by OpenAI's engineering team. Core primitives (Agents, Tools, Handoffs, Guardrails, Sessions, MCP) are stable. Some advanced features like code sandbox and subagents remain Python-only, but the TypeScript SDK covers the majority of production use cases including multi-agent pipelines and voice applications."
      }

      "@type": "Question",
      "name": "How does @openai/agents differ from the OpenAI Python SDK's agent features?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The @openai/agents npm package is a dedicated agent framework, while the Python SDK embeds agent primitives as part of the main openai library. The TypeScript SDK uniquely ships RealtimeAgent for voice, while the Python version leads on code interpreter, sandbox, harness, and nested subagent features. Both share the same core primitives and are maintained by OpenAI, but they diverge on platform-specific capabilities."
      }
    },
    {
      "@type": "Question",
      "name": "Can I use @openai/agents with models other than OpenAI's?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, with caveats. The SDK wraps the openai client, so any OpenAI-compatible API endpoint works — including Azure OpenAI, Groq, Together AI, and local Ollama instances that expose the /v1/chat/completions endpoint. Pass a custom OpenAI client with baseURL set to your provider. Function calling behavior varies by model; not all providers implement tool call parsing identically."
      }
    },
    {
      "@type": "Question",
      "name": "How do I persist agent memory across server restarts?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Implement the Session interface from @openai/agents/sessions with a durable backend. The interface requires getHistory(sessionId: string) returning SessionMessage[] and addMessage(sessionId: string, message: SessionMessage) returning void. Plug in Redis, DynamoDB, MongoDB, or any database your stack already uses. The built-in MemorySession is in-process only and resets on restart."
      }
    },

      "name": "What is the maximum number of agents I can orchestrate with handoffs?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "There is no hard limit in the SDK, but practical limits emerge from the maxTurns cap you set on run(). Each handoff consumes one turn, and tool calls within the receiving agent consume additional turns. A pipeline with 5 specialized agents, each requiring 2–3 tool calls, needs maxTurns of at least 20. The SDK validates that handoff targets exist at initialization time, catching circular handoff graphs before runtime."
