      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The 'Lost in the Middle' problem (Liu et al., 2024) describes a 30%+ accuracy drop for information placed in the middle of an LLM context window. Transformer attention is strongest at the beginning and end of the sequence. Practically: put your critical constraints and task instructions at the start or end of your prompt, with background context in the middle. For multi-file contexts, place the file you want modified closest to the task instruction."
      }
