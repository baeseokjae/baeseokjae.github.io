        "text": "No — Agent Builder requires an active OpenAI API billing account. The canvas design tool is free to use, but running agents consumes API credits. Free ChatGPT Plus subscriptions do not include API access; you need a separate API account at platform.openai.com with a payment method added."
      }

      "@type": "Question",
      "name": "How does Agent Builder differ from OpenAI Assistants?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Assistants (now legacy) provided a single-turn or multi-turn conversation interface with tool access but no visual workflow logic. Agent Builder replaces Assistants with a multi-step, graph-based orchestration model where you explicitly design the reasoning flow, add conditional branches, and chain multiple model calls — all visually. Assistants are still accessible via API but are no longer the recommended path for new agent development."
      }
    },
    {
      "@type": "Question",
      "name": "Can I export an Agent Builder agent and run it myself?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. The SDK Export feature converts your visual agent graph to Python code using the OpenAI Agents SDK. The exported code runs locally or on any Python environment. This is the recommended upgrade path when your agent needs custom logic that the canvas cannot accommodate, or when you want to run agents within your own infrastructure."
      }
    },
    {
      "@type": "Question",
      "name": "What data does OpenAI store when I use Agent Builder?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "By default, OpenAI stores conversation history for 30 days to power the monitoring and eval features. You can disable conversation logging in Agent Settings → Data Retention — this will also disable Live Monitoring. For enterprise accounts with a Data Processing Addendum, conversation data is not used for model training. Review your data residency requirements before deploying agents that handle PII or regulated data."
      }
    },
    {
      "@type": "Question",
      "name": "How do I handle errors and failed tool calls in Agent Builder?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Agent Builder's Branch Nodes can route on tool success or failure. Connect a Tool Node's error output to a Branch Node, then route failures to a fallback prompt that handles the error gracefully. For persistent failures, add a webhook Output Node that notifies your on-call system. The Eval Runs panel also surfaces tool failure rates by node, helping you identify which integrations are unreliable before they impact users."
      }
