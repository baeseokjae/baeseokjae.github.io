      "name": "What is the difference between a Claude Code subagent and a regular Claude session?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A subagent runs in an isolated context window with its own system prompt, tool access restrictions, and optional model override. The parent session delegates a task, the subagent executes it independently, and only the final result comes back to the parent. A regular session shares the full conversation history with the model on every turn."
      }
    },
    {
      "@type": "Question",
      "name": "How many subagents can run in parallel in Claude Code?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Claude Code supports 16+ parallel agents simultaneously. The practical limit depends on your API rate limits and the size of each subagent's workload. For most codebases, 5-10 parallel subagents covers the useful parallelism; beyond that, orchestration overhead starts to offset the gains."
      }
    },
    {
      "@type": "Question",
      "name": "Can subagents write to files without conflicting with each other?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, if you use the isolation: worktree flag. Each subagent with worktree isolation gets its own git worktree — a separate working directory — so simultaneous writes go to different locations. Without worktree isolation, parallel subagents that write to the same file will conflict."
      }
    },
