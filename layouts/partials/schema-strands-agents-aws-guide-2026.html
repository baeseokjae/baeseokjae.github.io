        "text": "No. Bedrock is one of 9+ supported model providers, but Strands works with Anthropic, OpenAI, Gemini, Ollama, and others out of the box. You can build and run agents entirely locally using Ollama without any AWS account or credentials."
      }

    {
      "@type": "Question",
      "name": "How does Strands Agents handle long-running tasks that exceed Lambda's timeout?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Use Fargate for the agent loop (no timeout) and Lambda for individual tool executions. The recommended production architecture is API Gateway → Fargate (agent loop) → Lambda (tools), which lets you scale tool execution independently of the main loop. Alternatively, use the Session Manager to checkpoint state and continue across multiple Lambda invocations."
      }
    },
    {
      "@type": "Question",
      "name": "Can Strands Agents work with agents built on other frameworks like LangGraph or CrewAI?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, via the A2A (Agent-to-Agent) protocol introduced in Strands 1.0. Any agent exposing an A2A-compliant endpoint can be invoked as a tool by a Strands orchestrator. This enables hybrid architectures where a Strands orchestrator coordinates LangGraph sub-agents for complex deterministic sub-tasks."
      }
    },
    {
      "@type": "Question",
      "name": "What's the difference between Strands Agents and Amazon Bedrock Agents (the managed console feature)?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Amazon Bedrock Agents is a no-code/low-code managed service configured through the AWS console. Strands Agents SDK is a code-first framework that you deploy yourself — it gives you full control over agent logic, tool definitions, and deployment targets. Strands can deploy to Bedrock AgentCore (the managed runtime), but it is a distinct product from the console-based Bedrock Agents service."
      }
    }
