      "@type": "Question",
      "name": "How does Phoenix handle trace data storage and retention?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "By default, Phoenix stores all traces in a local SQLite database at ~/.phoenix/ (or the PHOENIX_WORKING_DIR path in Docker). There are no built-in retention limits — traces accumulate until you delete them. In production Docker deployments, mount a persistent volume to /mnt/data. For large-scale production, configure PostgreSQL as the backend to handle higher write throughput and enable standard database backup/retention policies."
      }
    },
    {
      "@type": "Question",
      "name": "Can Phoenix run in CI/CD pipelines for automated LLM quality gates?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, and this is one of Phoenix's strongest use cases. The phoenix.evals Python API runs independently of the Phoenix UI server — you can run evaluations in a CI job using run_evals(), check scores programmatically, and fail the pipeline if quality drops below threshold. Many teams run Phoenix evals as a pytest fixture or a standalone script that gates deployments when hallucination rate exceeds a threshold."
      }
    },
    {
      "@type": "Question",
      "name": "What is the difference between Phoenix traces and traditional APM traces?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Traditional APM traces (Datadog, Jaeger, Zipkin) capture latency, error rates, and resource usage but have no understanding of LLM-specific semantics — they see an HTTP call to api.openai.com but can't tell you what prompt was sent or whether the response was faithful to the retrieved context. Phoenix traces use OpenInference semantic conventions that embed LLM-specific data — input messages, output messages, retrieved documents, embedding vectors, token counts — directly into span attributes, making them queryable and evaluatable in LLM-specific ways."
