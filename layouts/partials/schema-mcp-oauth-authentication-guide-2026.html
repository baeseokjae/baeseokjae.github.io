      "@type": "Question",
      "name": "Do stdio-based MCP servers need OAuth?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. The MCP spec explicitly exempts stdio-based servers (those launched as subprocesses by the MCP client) from the OAuth requirement. Stdio servers run with the same trust level as the host process, so environment variable-based credentials (API keys, secrets) are sufficient and appropriate. OAuth 2.1 is only mandatory for remote HTTP/SSE-based servers that multiple agents or users access over a network."
      }
    },
    {
      "@type": "Question",
      "name": "Can I use API keys instead of OAuth for a remote MCP server?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Technically possible but not compliant with the MCP spec for remote servers, and increasingly rejected by major MCP clients (Claude Desktop, ChatGPT plugins) that follow the spec. API keys are long-lived static secrets that don't support scope-based access control, token revocation, or multi-user consent flows. For any public or enterprise deployment, OAuth 2.1 is required."
      }
    },
    {
      "@type": "Question",
      "name": "What authorization server should I use in production?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Auth0 and Okta are the lowest-friction options for teams without existing identity infrastructure — both support PKCE, dynamic client registration, JWKS, and token introspection out of the box. For self-hosted requirements, Keycloak (open source) and Zitadel (open source, OIDC-native) are the two strongest choices. Avoid building a custom authorization server: the surface area for security mistakes is enormous."
      }
    },
    {
      "@type": "Question",
      "name": "How do I handle token refresh in a long-running AI agent?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Implement a token refresh 60 seconds before the access token expires, using the expires_in value from the initial token response. Store the refresh token in an encrypted secret store and implement single-consumer locking if multiple tool calls can run concurrently — two simultaneous refresh attempts will consume the refresh token, causing one to fail. After rotation, update the stored refresh token immediately before returning the new access token to the caller."
      }
    },
    {
      "@type": "Question",
      "name": "What is the confused deputy problem in MCP and how does OAuth solve it?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The confused deputy problem occurs when a compromised or malicious MCP server uses its own access token to make requests to other MCP servers or downstream APIs on behalf of the original user, escalating its privileges beyond what the user intended. OAuth 2.1 addresses this by binding tokens to specific audiences (aud claim) and scopes: a token issued for mcp-server-a with mcp:read scope is cryptographically rejected by mcp-server-b. The enterprise MCP gateway pattern provides an additional layer by reissuing narrow downstream tokens for each hop."
      }
    }
