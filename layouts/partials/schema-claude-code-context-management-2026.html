      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The 60% rule states that Claude Code's output quality begins noticeably degrading when the context window reaches approximately 60% of total capacity. The model's attention mechanism distributes across all tokens in the window, so as the window fills, earlier tokens (containing your requirements and constraints) receive progressively less attention. Compacting at 60% — not 95% — preserves the early-session context that makes Claude Code effective."

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Structure your CLAUDE.md with four sections: (1) Tech stack — list languages, frameworks, and version pins. (2) Architecture — key design decisions and their rationale. (3) Conventions — coding standards, naming patterns, commit format. (4) Gotchas — known quirks, temporary constraints, and warnings. Keep the project-level file between 150–400 words. Global ~/.claude/CLAUDE.md should stay under 100 lines since it loads for every session regardless of project."
      }

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Use /compact when the context window hits 60%, at natural session breakpoints (after completing a feature or major subtask), and before switching to a significantly different area of the codebase. Always include preservation hints specifying which decisions must survive. Never run /compact without preservation instructions — unguided compaction treats architectural decisions the same as routine file reads."
      }
