      "acceptedAnswer": {
        "@type": "Answer",
        "text": "MCP tools only appear in Agent mode (Cmd+I or Ctrl+I). They are completely invisible in normal Chat mode. If you're already in Agent mode and tools still don't appear, restart Cursor fully (not just reload the window), check that the server status dot is green in Settings → Tools & MCP, and verify the mcpServers root key is spelled correctly in your config file."

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Use stdio for local servers — it's an order of magnitude faster and simpler to configure. Use Streamable HTTP when the server runs on a remote host, when multiple team members need to share the same server instance, or when you need centralized access control. You can't easily switch later, so decide based on where the server will live, not just current convenience."
