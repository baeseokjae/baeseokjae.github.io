      "name": "What is the difference between DAST and SAST?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "DAST (Dynamic Application Security Testing) tests a running application by sending real HTTP requests and observing behavior — the same way an attacker would. SAST (Static Application Security Testing) analyzes source code without executing it. DAST finds runtime issues like authentication bypass and business logic flaws; SAST finds code-level issues like hardcoded secrets and injection patterns. Most enterprise teams use both together, and tools like Checkmarx correlate SAST and DAST findings for higher-confidence alerts."
      }
