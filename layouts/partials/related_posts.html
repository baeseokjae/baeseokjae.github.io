{{- $current := . }}
{{- $related := site.RegularPages.Related . | first 4 }}
{{- with $related }}
<section class="related-posts">
  <hr>
  <h3 id="related-posts">📎 Related Articles</h3>
  <ul class="related-posts-list">
    {{- range . }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <small style="color: var(--secondary);">— {{ .ReadingTime }} min read</small>
    </li>
    {{- end }}
  </ul>
</section>
{{- end }}
