      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Both Anthropic and OpenAI include cache hit metadata in API responses. Log cache_read_input_tokens (Anthropic) or the cached_tokens field (OpenAI) per request. A properly structured prompt with a long static prefix should hit cache on all requests after the first in a TTL window. If hit rate is below 70%, audit your prompt ordering—dynamic content is probably appearing before static content."
      }
