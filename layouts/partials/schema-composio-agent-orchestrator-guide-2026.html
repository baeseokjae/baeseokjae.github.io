      "name": "Does Composio Agent Orchestrator require a specific AI model?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. AO is model-agnostic. The agent plugin slot accepts Claude Code, OpenAI Codex, Aider, and custom adapters. You can run different agents on different tasks by configuring per-task overrides in ao.config.ts. Most teams default to Claude Code (claude-sonnet-4-6) for its strong code editing performance and long context window."

      "name": "How does AO handle merge conflicts between parallel agent branches?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AO does not automatically resolve merge conflicts. When a conflict is detected at PR creation or merge time, the SCM plugin marks the task blocked:conflict and notifies via the configured notifier (Slack, email). A human must resolve the conflict manually or instruct the agent via a ticket comment. Future roadmap items include automatic rebase-and-retry for simple conflicts."
      }
    },

      "@type": "Question",
      "name": "Can Composio Agent Orchestrator run on Windows?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The default tmux runtime requires a Unix-like environment, so bare Windows is not supported. Windows users can run AO inside WSL2 or use the Docker runtime plugin. The development team has indicated that a native Windows terminal runtime plugin is planned but not yet available."
      }
    },
    {
      "@type": "Question",
      "name": "How do I limit AO to specific repositories or branches?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "In ao.config.ts, set the allowedBranches and trackerFilter options. trackerFilter accepts a JMESPath expression evaluated against ticket metadata, so you can restrict AO to tickets with specific labels, milestones, or assignees. The allowedBranches pattern (glob) controls which base branches AO will open PRs against."
      }
    },
    {
      "@type": "Question",
      "name": "What happens if an agent session crashes mid-task in AO?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AO's Planner layer monitors all active Executor sessions via the runtime plugin. If a session exits unexpectedly (process crash, network timeout, API error), the Planner marks the task interrupted, releases the worktree, and re-queues the task for a new agent session after a configurable backoff (default: 5 minutes). The new session receives the full task context plus the last 50 lines of the interrupted session's terminal output to aid recovery."
      }
    }
