      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Next.js 15 ships both the App Router and Pages Router, and both receive updates. The Pages Router is not deprecated. The App Router is the recommended direction for new applications, but migration is strictly opt-in and incremental — you can run both simultaneously in the same project during migration."
      }

      "@type": "Question",
      "name": "Can I use Redux, Zustand, or other state managers with Server Components?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, but only in Client Components. State managers that rely on useState, context, or browser APIs must live inside 'use client' modules. The standard pattern is to keep your state provider in a Client Component wrapper at the root of your layout and access the store only from other Client Components."
      }
    },
    {
      "@type": "Question",
      "name": "What's the difference between 'use server' and a Server Component?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A Server Component is any component in the app/ directory that does not have 'use client' at the top. It renders on the server. 'use server' is a directive you add to an async function to create a Server Action — a server-callable RPC endpoint that Client Components can invoke for mutations. They are different concepts: Server Component = rendering primitive; 'use server' = callable server function."
      }
    },
    {
      "@type": "Question",
      "name": "Why did my fetch() stop caching in Next.js 15?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Next.js 15 changed the default cache behavior of fetch() from force-cache (cached indefinitely) to no-store (always fresh). This was a breaking change from Next.js 13/14 behavior. To restore caching, explicitly pass { cache: 'force-cache' } or { next: { revalidate: 3600 } } to your fetch() calls."
      }
    },
    {
      "@type": "Question",
      "name": "How do I share data between a Server Component and a Client Component without prop drilling?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Use React's cache() function to memoize a data-fetching function, then call it in both the Server Component (for the initial render) and the Client Component (via Server Action). For UI state that only lives client-side, use Zustand or Jotai in Client Components. For server-to-client data that doesn't need reactivity, pass it as serializable props from the parent Server Component to the child Client Component."
      }
    }
