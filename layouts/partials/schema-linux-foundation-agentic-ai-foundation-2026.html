    {
      "@type": "Question",
      "name": "What is the Agentic AI Foundation (AAIF)?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AAIF is a vendor-neutral foundation under the Linux Foundation that governs open infrastructure for AI agent systems, including the Model Context Protocol (MCP), the goose agent runtime, and the AGENTS.md behavioral specification. It launched in December 2025 with 150+ member organizations co-founded by Anthropic, OpenAI, and Block."
      }
    },
    {
      "@type": "Question",
      "name": "Why did Anthropic donate MCP to the Linux Foundation?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "MCP grew to 10,000+ servers and 97M+ downloads faster than Anthropic could govern it as a single vendor. Donating MCP to AAIF transfers governance to a neutral TSC, giving enterprise buyers protocol stability and removing vendor lock-in risk — the same reason Google donated Kubernetes to the CNCF in 2016."
      }
    },
    {
      "@type": "Question",
      "name": "What is A2A governance and how does it differ from MCP?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "MCP governs how agents connect to tools and data sources. A2A (Agent-to-Agent) governance addresses how agents interact with other agents — authorization scope, trust chain attestation, and audit logging for multi-agent delegation. AAIF's A2A working group is developing these specifications as a separate standard from MCP."
      }
    },
    {
      "@type": "Question",
      "name": "What is AGENTS.md and how does it work?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AGENTS.md is a behavioral specification format — similar to OpenAPI but for agent behavior rather than REST endpoints. It documents what tools an agent can access, under what conditions, and with what constraints. AAIF's TSC is developing validation tooling that checks deployed agent behavior against AGENTS.md declarations, enabling compliance teams to enforce agent governance without modifying agent code."
      }
    },
    {
      "@type": "Question",
      "name": "How does AAIF affect my existing MCP server or agent implementation?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Your existing MCP v1 servers remain compatible — AAIF's governance transition does not change the current protocol. What changes is the process for future protocol changes: any breaking change now requires a public RFC and TSC review. This makes MCP more stable for long-term production use, and gives you a channel to influence protocol evolution through the AAIF working groups."
      }
    }
  ]
