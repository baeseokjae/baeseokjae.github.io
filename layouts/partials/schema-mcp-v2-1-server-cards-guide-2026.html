      "name": "What is an MCP Server Card?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "An MCP Server Card is a JSON metadata document that describes an MCP server — its name, version, transport type, authentication method, and available tool namespaces. It's served at /.well-known/mcp/server-card.json and allows AI clients to discover and connect to your server automatically without manual configuration."

      "name": "Is the .well-known/mcp.json endpoint required for MCP v2.1?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The .well-known/mcp/server-card.json endpoint is strongly recommended but not strictly required for MCP v2.1 compliance. However, without it, your server won't appear in public registries like Smithery or the official MCP registry, and AI clients that support auto-discovery (including Claude Desktop) won't be able to find it without an explicit URL entry in client configuration."
      }

    {
      "@type": "Question",
      "name": "What's the difference between SEP-2127 and older server-card.json formats?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "SEP-2127 is the current standardized proposal that unifies earlier experimental formats, including SEP-1649 (the original server-card.json concept) and SEP-1960 (the manifest format). The key differences are the mcp_version field (new), the nested transport object (replaces flat transport_type), and the $schema reference which enables automatic JSON Schema validation."
      }
    },
    {
      "@type": "Question",
      "name": "How often do registries crawl server cards?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Crawl frequency varies by registry. The official MCP registry (mcp.run) crawls registered servers every 24 hours. Smithery crawls every 6 hours. Kong MCP Registry relies on push-based webhooks rather than crawling. Setting Cache-Control: public, max-age=3600 (one hour) is a good balance: fresh enough for registries to pick up version updates within a reasonable time, cached enough to avoid unnecessary origin hits."
      }
    },
    {
      "@type": "Question",
      "name": "Can I use MCP Server Cards for private internal servers?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Set visibility: private or visibility: organization in your server card. Private servers can still serve the card so authorized clients can validate before connecting, but won't be indexed by public registries. Enterprise MCP registries like Kong and Azure API Center support private registries where only approved clients can discover internal servers, giving you the benefits of auto-discovery while maintaining governance controls."
      }
