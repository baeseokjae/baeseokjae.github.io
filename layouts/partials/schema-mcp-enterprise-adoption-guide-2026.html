      "acceptedAnswer": {
        "@type": "Answer",
        "text": "STDIO is acceptable only for developer-local tooling where the MCP server accesses exclusively local resources (files on the developer's own machine). Any MCP server that accesses shared systems — APIs, databases, SaaS platforms — must run as a remote Streamable HTTP service behind proper authentication and gateway controls. The security and operational management requirements of enterprise deployments make STDIO unworkable for shared infrastructure."

      "name": "How does MCP handle multi-tenant enterprise environments where different business units need isolated tool access?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The MCP gateway handles multi-tenancy through team-based provisioning and token-scoped authorization. Each business unit is defined as a team in the gateway with its own tool access policy. When a user authenticates, their team membership (pulled from the IdP via OIDC groups) determines which MCP servers and tools they can invoke. Servers remain shared infrastructure; policy enforcement at the gateway creates the effective isolation between business units."
      }

      "name": "What is the recommended approach for migrating existing custom API integrations to MCP?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Migrate incrementally, starting with read-only integrations. Build MCP servers that expose the same capabilities as your existing custom integrations, deploy them behind your gateway, and pilot with one team before broader rollout. Do not attempt a big-bang migration of all integrations simultaneously — pilot with lower-risk read-only servers, develop organizational muscle for MCP operations, then expand to read-write and higher-risk integrations. Budget 2–4 weeks per custom server migration for complex systems."

      "acceptedAnswer": {
        "@type": "Answer",
