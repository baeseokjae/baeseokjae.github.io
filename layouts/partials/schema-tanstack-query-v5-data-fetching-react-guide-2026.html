      "name": "Do I need TanStack Query if I'm already using the Vercel AI SDK for streaming?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The Vercel AI SDK (useChat, useCompletion) handles the streaming transport layer for LLM responses and works standalone. TanStack Query adds value on top when you need to cache AI responses across components, sync state across browser tabs with broadcastQueryClient, combine AI data with non-AI server data in the same cache, or manage optimistic updates for chat messages. For simple chatbot UIs, the AI SDK alone is sufficient. For complex AI dashboards or apps with multiple data sources, TanStack Query complements the AI SDK by managing the broader data layer."
      }

      "@type": "Question",
      "name": "What's the difference between staleTime and gcTime in TanStack Query v5?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "staleTime controls when data is considered stale and eligible for background refetch on next mount or focus. gcTime controls when inactive cache entries are garbage collected from memory. Data can be stale but still in cache — components get the stale value instantly while a background refetch runs. When gcTime expires for an inactive entry, it's removed entirely and the next access triggers a fresh fetch with a loading state. In v4 this was called cacheTime; v5 renamed it to gcTime to clarify the distinction."
      }
    },
    {
      "@type": "Question",
      "name": "How does streamedQuery work with abort signals when users navigate away?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "streamedQuery automatically passes an AbortSignal to your query function via the signal parameter in the function context. When the component unmounts (user navigates away) or the query is cancelled, TanStack Query aborts the signal. If you pass this signal to fetch(), the in-flight HTTP request is cancelled at the browser level — stopping the LLM stream and preventing unnecessary token consumption. Always wire signal through to your fetch calls when using streamedQuery."
      }
    },
    {
      "@type": "Question",
      "name": "Can I use TanStack Query with React Server Components in Next.js App Router?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, with a specific pattern: you prefetch queries in Server Components using queryClient.prefetchQuery and serialize the result with dehydrate. This dehydrated state passes to HydrationBoundary in a Client Component, which hydrates the client cache. Client Components then use useQuery or useSuspenseQuery and get the prefetched data immediately without a loading state. The QueryClient itself must be instantiated in a 'use client' boundary — never in Server Components — to avoid sharing state between concurrent requests."
      }
    },

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. TanStack Query doesn't manage the WebSocket connection itself, but you can use queryClient.setQueryData to push WebSocket messages directly into the cache from an effect or a WebSocket event handler. This pattern — external event source writes into the query cache, components read from the cache — works cleanly for real-time AI streaming dashboards. You get TanStack Query's cache management, DevTools, and component integration for free, with WebSocket handling only where it belongs: the connection layer."
