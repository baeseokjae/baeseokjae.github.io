      "name": "What is the difference between LlmAgent and SequentialAgent in Google ADK?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "LlmAgent is a reasoning primitive — it calls a Gemini model to decide what to do, which tools to invoke, and what to return. SequentialAgent is a workflow primitive — it has no model of its own, it just runs a list of child agents one after another in order. You compose them: a SequentialAgent contains LlmAgents as children."
      }

      "@type": "Question",
      "name": "How does session state work in Google ADK multi-agent systems?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Session state (session.state) is a Python dictionary that persists for the lifetime of a conversation session. Agents write to it via output_key (the agent's response is automatically stored at that key) or by returning dictionaries from tool functions. All agents in the same pipeline share the same state object, so downstream agents read what upstream agents wrote."
      }
    },

      "acceptedAnswer": {
        "@type": "Answer",

      }
