      "name": "What is OpenTelemetry GenAI semantic conventions and why does it matter?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "OpenTelemetry GenAI semantic conventions are the standardized set of attribute names, span types, and metric definitions that give AI/LLM telemetry a consistent structure across every framework and vendor. They matter because without them, a LangChain trace uses different attribute names than an OpenAI trace, making aggregation and alerting across your stack impossible. In 2026, core client spans and token usage metrics are stable, meaning you can build production dashboards on them without breaking change risk."
      }
    },
    {
      "@type": "Question",
      "name": "How do I instrument an OpenAI or Anthropic client without changing my application code?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Use openlit.init() before your first API call. It patches the OpenAI and Anthropic client libraries automatically using monkey-patching, so every client.chat.completions.create() call generates a span with GenAI attributes without requiring any code changes to your existing agent logic. You only need to configure the TracerProvider once at application startup."
      }
    },
    {
      "@type": "Question",
      "name": "What is the difference between session-level and request-level observability for AI agents?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Request-level observability covers a single LLM call: model, tokens, latency. Session-level observability covers the entire user interaction: all agent runs, all tool calls, cost totals, and outcome. Session-level requires threading a session.id through every span and aggregating across multiple traces. OpenTelemetry Baggage is the standard mechanism for propagating session context across agent boundaries without adding it to every span attribute manually."
      }
    },
    {
      "@type": "Question",
      "name": "How do I avoid storing sensitive user data (PII) in my traces?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Set capture_message_content=False in openlit (which is the default). GenAI conventions separate prompt/completion content into span events rather than attributes, so stripping them at the OpenTelemetry Collector level is straightforward — add a redaction processor that blocks gen_ai.content.prompt and gen_ai.content.completion event attributes. This gives you full token usage and latency observability without storing any message content."
      }
    },
    {
      "@type": "Question",
      "name": "Which observability backend should I use for AI agents in 2026?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "For most teams: Grafana Cloud for its generous free tier, native OTLP support, and pre-built LLM dashboard templates. For LLM-specific features like prompt management and evaluation: Langfuse (open source, 21K+ GitHub stars). For maximum flexibility and self-hosting: Jaeger + OpenTelemetry Collector + VictoriaMetrics. All three work with the same OTel SDK instrumentation — you switch backends by changing an endpoint URL, not rewriting instrumentation code."
