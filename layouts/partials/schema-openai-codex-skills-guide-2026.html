      "name": "What is the difference between a Codex Skill and an AGENTS.md file?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AGENTS.md is always loaded for every Codex session in the repository — it provides universal project rules that apply unconditionally. A Codex Skill is loaded on-demand only when Codex determines the skill is relevant to the current task. Use AGENTS.md for standards that always apply (coding style, test commands), and Skills for procedures you invoke situationally (PR review, deployments, changelog generation)."
      }
    },
    {
      "@type": "Question",
      "name": "Can I share Codex Skills with my team?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Skills stored in .agents/skills/ inside a repository are checked into git and shared with everyone who clones the repo. This is the recommended approach for team workflows. Personal skills at ~/.agents/skills/ stay on your local machine and aren't shared."
      }
    },
    {
      "@type": "Question",
      "name": "How does Codex decide which skill to use?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Codex reads the name, description, and 'When to use this skill' section of each installed skill. When you give Codex a task, it matches your request against these metadata fields and selects the most relevant skill, loading the full SKILL.md only after selection. Writing specific, natural-language trigger phrases in this section is the primary way to improve matching reliability."
      }
    },
    {
      "@type": "Question",
      "name": "How do I install a skill from the official openai/skills catalog?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Run 'codex install-skill {skill-name}' in your terminal. For example, 'codex install-skill gh-fix-ci' installs the CI fix skill into .agents/skills/. The skill is ready to use immediately after installation. You can also clone the openai/skills GitHub repo and copy skill directories manually."
      }
    },
    {
      "@type": "Question",
      "name": "Can skills run shell commands and scripts?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Skills can include a scripts/ directory with shell scripts that Codex executes as part of the workflow. Codex has access to your terminal environment when running skills, so scripts can use gh, git, npm, cargo, and any other CLI tools available on your machine. For CI environments, ensure required tools are available in the CI runner image."
      }
