      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Prompt injection is ranked #1 by OWASP and represents the most actively exploited MCP attack class. Attackers embed instructions in tool outputs, files, or API responses that the agent's language model interprets as directives — enabling data exfiltration, unauthorized tool invocations, and session hijacking. The defense is a scratchpad architecture that keeps tool outputs out of the model's instruction stream."

      "@type": "Question",
      "name": "What is an MCP rug pull attack?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "An MCP rug pull attack occurs when a user approves an MCP server's tool definitions, and the server subsequently changes those definitions without triggering a re-approval prompt. Because many MCP clients fetch tool schemas dynamically at runtime, a malicious or compromised server can silently add capabilities (like data exfiltration) to a tool the user already trusts. Prevention requires hashing tool schemas at approval time and alerting on any subsequent change."
      }
    },
    {
      "@type": "Question",
      "name": "Is OAuth 2.0 sufficient for MCP server authentication?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "OAuth 2.0 alone is insufficient. MCP deployments require OAuth 2.1 (which removes unsafe grant types) combined with PKCE to prevent authorization code interception, and resource indicators (RFC 8707) to bind tokens to specific MCP servers. Without resource indicators, a token issued for one MCP server can be replayed against any other server that shares the same authorization server."
      }
    },

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Pin all MCP package versions in your lockfile, run npm audit or pip-audit in CI as a blocking check, and build container images for MCP servers from known-good snapshots rather than installing packages at runtime. Subscribe to CVE feeds filtered for MCP-related vulnerabilities — MCPoison CVE-2025-54136 (CVSS 9.6) showed that MCP supply chain attacks can affect packages with hundreds of thousands of downloads before detection."

      "acceptedAnswer": {
        "@type": "Answer",
