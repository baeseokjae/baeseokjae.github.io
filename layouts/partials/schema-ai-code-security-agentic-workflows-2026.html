      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Add a pre_commit Hook to .claude/settings.json that runs 'semgrep scan --config=auto --error .' with 'on_failure: block'. This causes Claude Code to halt any commit containing Semgrep findings at critical or high severity, requiring the agent to self-correct before the commit completes. For secrets specifically, add a second Hook on pre_tool_call for write_file events running 'semgrep scan --config=p/secrets'."

      "acceptedAnswer": {
        "@type": "Answer",
