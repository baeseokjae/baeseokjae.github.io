      "name": "What's the difference between handoffs and agents-as-tools?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Handoffs transfer control from one agent to another — the delegating agent stops and the receiving agent takes over. Agents-as-tools keep the orchestrator in control while specialist agents are called as functions. Use handoffs for linear pipelines with clear boundaries; use agents-as-tools when an orchestrator needs to synthesize results from multiple specialists or make conditional routing decisions."
      }
