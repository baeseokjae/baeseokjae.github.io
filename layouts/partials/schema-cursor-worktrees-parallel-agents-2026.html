      "name": "What is the /worktree command in Cursor?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The /worktree command in Cursor creates an isolated Git worktree — a separate directory checkout of your repository on a new branch — and runs the AI agent's task entirely within that sandbox. Your main working directory is untouched until you run /apply-worktree to bring the changes back. It is the primary mechanism for running experimental or risky agent tasks without fear of permanently altering your codebase."
      }

      "name": "Can I run multiple agents at the same time in Cursor?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. With Cursor 3 (Glass), you can run multiple agents simultaneously using the Agents Window. Each agent operates in its own Git worktree — an isolated directory on a separate branch — so they cannot conflict with each other's file changes. You manage all running agents from the Agents Window sidebar and apply or discard their results independently."
      }
    },

      "name": "What does /best-of-n do in Cursor?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The /best-of-n command sends the same task to N different AI models simultaneously, each running in its own isolated worktree. When all agents finish, you compare the results side by side and use /apply-worktree to merge the best outcome into your main checkout. It is designed for scenarios where the optimal implementation approach is unclear and you want empirical comparison rather than picking a model by reputation."
      }
    },
    {
      "@type": "Question",
      "name": "Do Cursor worktrees work with existing CI/CD pipelines?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Worktree-generated branches are standard Git branches and trigger existing CI/CD pipelines when pushed to remote. The recommended pattern is: agent finishes in worktree → push branch to remote → CI runs → if passed, open PR → human reviews → merges to main → delete worktree. No changes to your CI configuration are required."
      }

      "name": "How do I clean up Cursor worktrees?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Run /delete-worktree <branch-name> inside Cursor to remove a worktree and its associated branch. Alternatively, use git worktree remove <path> and git branch -d <branch> from the terminal. Run git worktree list to see all active worktrees. It is good practice to clean up after each merged or rejected agent run to avoid disk accumulation on large repositories."
      }
